name: Generate Meta

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run generator
        run: python main/run.py dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meta-output
          path: dist/
